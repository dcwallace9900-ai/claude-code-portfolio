<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Connection lines -->
  <line x1="16" y1="5" x2="5" y2="25" stroke="#0284c7" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="16" y1="5" x2="27" y2="25" stroke="#0284c7" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="5" y1="25" x2="27" y2="25" stroke="#0284c7" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Interior cross-connections -->
  <line x1="16" y1="5" x2="16" y2="25" stroke="#38bdf8" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 3"/>
  <!-- Nodes -->
  <circle cx="16" cy="5" r="3.5" fill="#0284c7"/>
  <circle cx="5" cy="25" r="3.5" fill="#0284c7"/>
  <circle cx="27" cy="25" r="3.5" fill="#0284c7"/>
  <!-- Center accent node -->
  <circle cx="16" cy="18" r="2" fill="#38bdf8"/>
</svg>
